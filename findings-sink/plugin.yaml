apiVersion: plugin.gibson.zeroroot.ai/v1
kind: Plugin
metadata:
  name: findings-sink
  version: 0.1.0
  description: "findings-sink plugin"
  author: ""
spec:
  workload_class: plugin
  runtime: process
  secrets:
  - name: tracker-token
    scope: startup
    rotation: live
    required: true
  methods:
  - name: Echo
    description: "Echo returns the request message unchanged."
    request_proto: "gibson.plugins.findingssink.v1.EchoRequest"
    response_proto: "gibson.plugins.findingssink.v1.EchoResponse"
  health:
    startup_timeout: 30s
    liveness_interval: 10s
