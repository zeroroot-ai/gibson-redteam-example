syntax = "proto3";

package gibson.plugins.findingssink.v1;

option go_package = "github.com/zeroroot-ai/gibson-redteam-example/findings-sink/api/gen/gibson/plugins/findingssink/v1;findingssinkv1";

// Finding is a security finding the agent wants tracked.
message Finding {
  string title = 1;
  // severity is one of: critical, high, medium, low, info.
  string severity = 2;
  // category is e.g. jailbreak, prompt_injection, data_extraction.
  string category = 3;
  string description = 4;
  string target_url = 5;
  string evidence = 6;
}

// Ticket is a filed finding plus tracking metadata.
message Ticket {
  string ticket_id = 1;
  Finding finding = 2;
  // filed_at is a Unix timestamp (seconds).
  int64 filed_at = 3;
  repeated string notes = 4;
}

// FileFindingRequest files a new finding and returns its ticket id.
message FileFindingRequest {
  Finding finding = 1;
}

message FileFindingResponse {
  string ticket_id = 1;
}

// ListTicketsRequest lists filed tickets, optionally filtered. Empty
// filters match everything.
message ListTicketsRequest {
  string severity = 1;
  string category = 2;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

// AnnotateRequest appends a note to an existing ticket.
message AnnotateRequest {
  string ticket_id = 1;
  string note = 2;
}

message AnnotateResponse {
  bool ok = 1;
}
