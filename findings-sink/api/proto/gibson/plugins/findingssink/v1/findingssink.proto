syntax = "proto3";

package gibson.plugins.findingssink.v1;

option go_package = "github.com/zeroroot-ai/gibson-redteam-example/findings-sink/api/gen/gibson/plugins/findingssink/v1;findingssinkv1";

// EchoRequest is the request message for the Echo method.
message EchoRequest {
  // message is the text to echo back.
  string message = 1;
}

// EchoResponse is the response message for the Echo method.
message EchoResponse {
  // reply echoes the request message back unchanged.
  string reply = 1;
}
